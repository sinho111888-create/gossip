<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>每日一占</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@300;400;600;700&display=swap');

* { margin:0; padding:0; box-sizing:border-box; }

body {
  min-height:100vh;
  background: linear-gradient(160deg, #faf5fc 0%, #f3e8f8 30%, #fce8f0 100%);
  font-family: 'Noto Serif SC', serif;
  color: #3d2648;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:40px 20px 60px;
}

.header {
  text-align:center;
  margin-bottom:32px;
}

.header h1 {
  font-family:'Ma Shan Zheng', cursive;
  font-size:44px;
  color:#8b3a9e;
  letter-spacing:6px;
  margin-bottom:6px;
}

.header .sub {
  font-size:13px;
  color:#b088b8;
  letter-spacing:4px;
}

.input-card {
  background:#fff;
  border-radius:16px;
  padding:28px 32px;
  width:100%;
  max-width:460px;
  box-shadow: 0 2px 20px rgba(130,60,160,0.08), 0 1px 4px rgba(130,60,160,0.04);
  margin-bottom:28px;
  border:1px solid #ecd8f0;
}

.input-card label {
  display:block;
  text-align:center;
  font-size:14px;
  color:#9b7aaa;
  letter-spacing:3px;
  margin-bottom:14px;
}

.num-row {
  display:flex;
  gap:12px;
  align-items:center;
  justify-content:center;
}

.num-row input {
  width:100px;
  padding:12px 0;
  text-align:center;
  font-size:22px;
  font-family:'Noto Serif SC', serif;
  border:1.5px solid #e4c8e8;
  border-radius:10px;
  color:#5b2870;
  background:#fdf8fe;
  outline:none;
  transition:all .25s;
  -moz-appearance:textfield;
}
.num-row input::-webkit-inner-spin-button { display:none; }

.num-row input:focus {
  border-color:#b870d0;
  box-shadow:0 0 0 3px rgba(180,100,200,0.1);
  background:#fff;
}

.num-row .sep {
  font-size:20px;
  color:#c8a0d0;
  font-family:'Ma Shan Zheng', cursive;
}

.num-row button {
  padding:12px 32px;
  background:linear-gradient(135deg, #a855c8, #8b3a9e);
  border:none;
  border-radius:10px;
  color:#fff;
  font-size:17px;
  font-family:'Ma Shan Zheng', cursive;
  letter-spacing:4px;
  cursor:pointer;
  transition:all .25s;
  box-shadow:0 2px 12px rgba(140,60,160,0.2);
}

.num-row button:hover {
  transform:translateY(-1px);
  box-shadow:0 4px 18px rgba(140,60,160,0.3);
}

.num-row button:active {
  transform:scale(0.97);
}

.result-area {
  display:none;
  width:100%;
  max-width:680px;
}

.result-area.show { display:block; }

.method-card {
  background:#fff;
  border-radius:14px;
  padding:24px 28px;
  margin-bottom:16px;
  box-shadow:0 1px 12px rgba(130,60,160,0.05);
  border:1px solid #ecd8f0;
  transition:all .3s;
}

.method-card:hover {
  box-shadow:0 4px 24px rgba(130,60,160,0.1);
}

.method-head {
  display:flex;
  align-items:center;
  gap:10px;
  margin-bottom:14px;
  padding-bottom:10px;
  border-bottom:1px solid #f4e4f8;
}

.method-head .icon {
  width:32px; height:32px;
  border-radius:8px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:16px;
}

.method-head h2 {
  font-size:17px;
  font-weight:600;
  color:#5b2870;
  letter-spacing:2px;
}

.method-head .badge {
  font-size:10px;
  padding:2px 8px;
  border-radius:20px;
  letter-spacing:1px;
  font-weight:600;
}

.badge-ji { background:#e8f5e0; color:#5b9a3a; }
.badge-xiong { background:#fde8e8; color:#c84848; }
.badge-zhong { background:#fef3e0; color:#b87828; }

.method-body {
  font-size:14px;
  line-height:1.8;
  color:#5e4270;
}

.method-body .line-row {
  display:flex;
  align-items:center;
  gap:8px;
  padding:4px 0;
  font-size:15px;
}

.method-body .line-row .yao {
  font-size:20px;
  min-width:80px;
  letter-spacing:2px;
}

.yao-change { color:#d63384; font-weight:700; }
.yao-stable { color:#6b4d78; }

.gua-display {
  text-align:center;
  padding:12px 0;
  margin:8px 0;
  background:#fdf8fe;
  border-radius:10px;
}

.gua-display .big-name {
  font-family:'Ma Shan Zheng', cursive;
  font-size:32px;
  color:#8b3a9e;
  letter-spacing:4px;
}

.gua-display .detail {
  font-size:12px;
  color:#b088b8;
  margin-top:2px;
  letter-spacing:1px;
}

.method-body .sub-label {
  font-size:12px;
  color:#b088b8;
  letter-spacing:2px;
  margin-top:10px;
  margin-bottom:4px;
}

.arrow-row {
  display:flex;
  align-items:center;
  justify-content:center;
  gap:12px;
  margin:8px 0;
  font-size:14px;
  color:#a878b8;
}

.xiaoliuren-grid {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
  margin-top:8px;
}

.xiaoliuren-grid .sl-item {
  font-size:13px;
  padding:6px 10px;
  background:#fdf8fe;
  border-radius:8px;
}

.sl-item .sl-label {
  font-size:11px;
  color:#a880b8;
  letter-spacing:1px;
}

.method-body p {
  margin:4px 0;
}

.footer-action {
  text-align:center;
  margin-top:24px;
}

.footer-action button {
  background:none;
  border:1.5px solid #d8b8e0;
  border-radius:20px;
  padding:8px 28px;
  font-size:13px;
  color:#8b5098;
  letter-spacing:3px;
  cursor:pointer;
  font-family:'Noto Serif SC', serif;
  transition:all .25s;
}

.footer-action button:hover {
  border-color:#b870d0;
  color:#6b3080;
  background:#fdf8fe;
}

@keyframes fadeUp {
  from { opacity:0; transform:translateY(16px); }
  to { opacity:1; transform:translateY(0); }
}

.result-area.show .method-card {
  animation:fadeUp .5s ease both;
}
.result-area.show .method-card:nth-child(1) { animation-delay:0s; }
.result-area.show .method-card:nth-child(2) { animation-delay:.08s; }
.result-area.show .method-card:nth-child(3) { animation-delay:.16s; }
.result-area.show .method-card:nth-child(4) { animation-delay:.24s; }

@media (max-width:480px) {
  body { padding:24px 12px 40px; }
  .num-row input { width:72px; font-size:18px; padding:10px 0; }
  .num-row button { padding:10px 20px; font-size:15px; }
  .method-card { padding:16px 18px; }
  .xiaoliuren-grid { grid-template-columns:1fr; }
}
</style>
</head>
<body>

<div class="header">
  <h1>每日一占</h1>
  <div class="sub">— 小六壬 · 梅花易数 · 六爻 · 大六壬 —</div>
</div>

<div class="input-card">
  <label>心中默想两个数字</label>
  <div class="num-row">
    <input type="number" id="num1" placeholder="数一" min="1" max="999">
    <span class="sep">·</span>
    <input type="number" id="num2" placeholder="数二" min="1" max="999">
    <button onclick="doDivination()">起 卦</button>
  </div>
</div>

<div class="result-area" id="resultArea">
  <div class="method-card" id="cardXiaoLiuRen"></div>
  <div class="method-card" id="cardMeiHua"></div>
  <div class="method-card" id="cardLiuYao"></div>
  <div class="method-card" id="cardDaLiuRen"></div>

  <div class="footer-action">
    <button onclick="resetAll()">再占一卦</button>
  </div>
</div>

<script>
/* ========== TRIGRAMS & HEXAGRAMS ========== */
const baGua = [
  { idx:0, name:'乾', element:'金', symbol:'☰', nature:'天', dir:'西北', body:'头', desc:'刚健' },
  { idx:1, name:'坤', element:'土', symbol:'☷', nature:'地', dir:'西南', body:'腹', desc:'柔顺' },
  { idx:2, name:'离', element:'火', symbol:'☲', nature:'火', dir:'南',   body:'目', desc:'光明' },
  { idx:3, name:'坎', element:'水', symbol:'☵', nature:'水', dir:'北',   body:'耳', desc:'险陷' },
  { idx:4, name:'震', element:'木', symbol:'☳', nature:'雷', dir:'东',   body:'足', desc:'震动' },
  { idx:5, name:'艮', element:'土', symbol:'☶', nature:'山', dir:'东北', body:'手', desc:'静止' },
  { idx:6, name:'巽', element:'木', symbol:'☴', nature:'风', dir:'东南', body:'股', desc:'入微' },
  { idx:7, name:'兑', element:'金', symbol:'☱', nature:'泽', dir:'西',   body:'口', desc:'悦乐' },
];

const hex64 = [
  [0,0, '乾为天','元亨利贞，刚健不息。六爻纯阳，君子当自强。'],
  [1,1, '坤为地','元亨，利牝马之贞。柔顺承载，厚德载物。'],
  [3,4, '水雷屯','元亨利贞。勿用有攸往。万物始生，艰难中藏生机。'],
  [5,3, '山水蒙','亨。匪我求童蒙，童蒙求我。蒙昧待启，求教当时。'],
  [3,0, '水天需','有孚，光亨，贞吉。利涉大川。待时而动，饮食宴乐。'],
  [0,3, '天水讼','有孚窒惕，中吉，终凶。争讼宜退，求中正。'],
  [1,3, '地水师','贞，丈人吉，无咎。师出有名，以正伐邪。'],
  [3,1, '水地比','吉。原筮元永贞，无咎。亲附和合，广结善缘。'],
  [6,0, '风天小畜','亨。密云不雨。小有积蓄，未可大行。'],
  [0,7, '天泽履','履虎尾，不咥人，亨。如履薄冰，谨慎行事。'],
  [1,0, '地天泰','小往大来，吉亨。天地交泰，万象更新。'],
  [0,1, '天地否','否之匪人，不利君子贞。天地不交，韬光养晦。'],
  [0,2, '天火同人','同人于野，亨。利涉大川。与人同心，其利断金。'],
  [2,0, '火天大有','元亨。所有者大，光明普照，当仁不让。'],
  [1,5, '地山谦','亨，君子有终。满招损，谦受益。'],
  [4,1, '雷地豫','利建侯行师。悦乐而动，顺势而为。'],
  [7,4, '泽雷随','元亨利贞，无咎。随时之义大矣哉。'],
  [5,6, '山风蛊','元亨，利涉大川。先甲三日，后甲三日。振弊起衰。'],
  [1,7, '地泽临','元亨利贞。至于八月有凶。亲临督导，事必躬亲。'],
  [6,1, '风地观','盥而不荐，有孚颙若。观天察地，静观其变。'],
  [2,4, '火雷噬嗑','亨，利用狱。噬嗑者，啮而合也。明罚敕法。'],
  [5,2, '山火贲','亨。小利有攸往。饰以文采，外华内实。'],
  [5,1, '山地剥','不利有攸往。小人道长，君子道消。剥落之象。'],
  [1,4, '地雷复','亨。出入无疾，朋来无咎。一阳来复，万象更新。'],
  [0,4, '天雷无妄','元亨利贞。其匪正有眚，不利有攸往。真实无妄。'],
  [5,0, '山天大畜','利贞。不家食吉，利涉大川。蓄德养贤，厚积薄发。'],
  [5,4, '山雷颐','贞吉。观颐，自求口实。颐养之道，自食其力。'],
  [7,6, '泽风大过','栋桡，利有攸往，亨。非常之时，非常之举。'],
  [3,3, '坎为水','习坎，有孚，维心亨，行有尚。险中求存，诚信为本。'],
  [2,2, '离为火','利贞，亨。畜牝牛，吉。光明正大，依附得吉。'],
  [7,5, '泽山咸','亨利贞，取女吉。感而遂通，心有灵犀。'],
  [4,6, '雷风恒','亨，无咎，利贞，利有攸往。恒久不变，持之有恒。'],
  [0,5, '天山遁','亨，小利贞。退避有时，以退为进。'],
  [4,0, '雷天大壮','利贞。大者壮也，刚以动。声势浩大，宜守正。'],
  [2,1, '火地晋','康侯用锡马蕃庶，昼日三接。旭日东升，蒸蒸日上。'],
  [1,2, '地火明夷','利艰贞。明入地中，韬光养晦，处困守正。'],
  [6,2, '风火家人','利女贞。正家而天下定，家和万事兴。'],
  [2,7, '火泽睽','小事吉。二女同居，其志不同行。求同存异。'],
  [3,5, '水山蹇','利西南，不利东北。利见大人，贞吉。艰难险阻。'],
  [4,3, '雷水解','利西南，无所往，其来复吉。有攸往，夙吉。解脱困境。'],
  [5,7, '山泽损','有孚，元吉，无咎，可贞，利有攸往。损下益上。'],
  [6,4, '风雷益','利有攸往，利涉大川。损上益下，民悦无疆。'],
  [7,0, '泽天夬','扬于王庭，孚号有厉。告自邑，不利即戎。决断果断。'],
  [0,6, '天风姤','女壮，勿用取女。不期而遇，一阴始生。'],
  [7,1, '泽地萃','亨。王假有庙。利见大人，亨，利贞。汇聚精英。'],
  [1,6, '地风升','元亨，用见大人，勿恤，南征吉。步步高升，小以高大。'],
  [7,3, '泽水困','亨，贞，大人吉，无咎。有言不信。困而不失其所。'],
  [3,6, '水风井','改邑不改井，无丧无得。往来井井。井养不穷。'],
  [7,2, '泽火革','巳日乃孚，元亨利贞，悔亡。变革之时，顺天应人。'],
  [2,6, '火风鼎','元吉，亨。鼎新革故，养贤用能。'],
  [4,4, '震为雷','亨。震惊百里，不丧匕鬯。临危不乱，处变不惊。'],
  [5,5, '艮为山','艮其背，不获其身。行其庭，不见其人。知止不殆。'],
  [6,5, '风山渐','女归吉，利贞。循序渐进，不可冒进。'],
  [4,7, '雷泽归妹','征凶，无攸利。归妹，天地之大义。慎始敬终。'],
  [4,2, '雷火丰','亨，王假之，勿忧，宜日中。丰盛之时，盛极防衰。'],
  [2,5, '火山旅','小亨，旅贞吉。行旅在外，宜守正。'],
  [6,6, '巽为风','小亨，利有攸往，利见大人。柔顺而入，风行天下。'],
  [7,7, '兑为泽','亨利贞。悦而利贞，顺天应人。'],
  [6,3, '风水涣','亨。王假有庙，利涉大川，利贞。涣散重聚。'],
  [3,7, '水泽节','亨。苦节不可贞。节以制度，不伤财害民。'],
  [6,7, '风泽中孚','豚鱼吉，利涉大川，利贞。诚信感物，信及豚鱼。'],
  [4,5, '雷山小过','亨利贞。可小事，不可大事。小有过之，宜下不宜上。'],
  [3,2, '水火既济','亨小，利贞。初吉终乱。事成之后，慎始慎终。'],
  [2,3, '火水未济','亨。小狐汔济，濡其尾，无攸利。未竟之业，仍需努力。'],
];

function findHex(upper,lower) {
  for (let h of hex64) {
    if (h[0]===upper && h[1]===lower) return h;
  }
  const u=baGua[upper], l=baGua[lower];
  return [upper,lower, l.name+u.name, `${l.desc}而${u.desc}，${l.nature}下${u.nature}上之象。`];
}

/* ========== 小六壬 DATA ========== */
const xiaoLiuRen = [
  { name:'大安', level:'ji', wuxing:'木', desc:'身不动时，五行属木，东方青龙。主平安稳定，诸事顺遂。所求之事多成，远行有归，失物不远。', career:'工作安稳，宜守不宜攻。按部就班即有收获。', wealth:'财运平稳，宜储蓄不宜投机。' ,love:'感情和睦，平淡是真。', health:'身体无恙，注意肝胆养护。', dir:'东方' },
  { name:'留连', level:'xiong', wuxing:'水', desc:'卒未归时，五行属水，北方玄武。主事有牵绊，欲速不达。凡事反复，宜耐心等待。', career:'事多拖延，宜沉住气，不宜冒进换岗。', wealth:'财运欠佳，慎防破耗，不宜投资。', love:'关系暧昧不明，宜保持距离观之。', health:'有湿气之患，注意脾胃与肾脏。', dir:'北方' },
  { name:'速喜', level:'ji', wuxing:'火', desc:'人便至时，五行属火，南方朱雀。主喜事临门，消息速达。万事可望迅速成就。', career:'有升迁或跳槽良机，宜当机立断。', wealth:'偏财运佳，有意外进账之喜。', love:'桃花旺盛，单身者有望遇良缘。', health:'心火稍旺，注意口腔与睡眠。', dir:'南方' },
  { name:'赤口', level:'xiong', wuxing:'金', desc:'官事凶时，五行属金，西方白虎。主口舌是非，官非争讼。言多必失，宜沉默低调。', career:'谨防小人，工作中口舌之争能避则避。', wealth:'有破财风险，不宜借贷与担保。', love:'易生口角，说话留三分余地。', health:'注意呼吸道与肺部健康。', dir:'西方' },
  { name:'小吉', level:'ji', wuxing:'木', desc:'人来喜时，五行属木，东方六合。主小有喜乐，诸事和合。虽非大吉，亦有所得。', career:'合作运佳，宜借团队之力成事。', wealth:'小有进账，宜见好就收。', love:'有喜相逢之兆，关系向好。', health:'大体安好，注意肠胃消化。', dir:'东方' },
  { name:'空亡', level:'xiong', wuxing:'土', desc:'音信稀时，五行属土，中方勾陈。主谋事落空，劳而无功。宜静不宜动，守成为上。', career:'事多不顺，方案易被否，宜蛰伏。', wealth:'财来财去一场空，忌投资赌博。', love:'缘分难成，宜随缘不执著。', health:'脾胃不调，情绪易低落。', dir:'中央' },
];

/* ========== 大六壬 DATA ========== */
const tianJiang = [
  { name:'贵人', level:'ji', wuxing:'土', desc:'己丑土。贵神之主，司福佑。今日贵人临身，凡事有助。遇困得解，逢凶化吉。' },
  { name:'腾蛇', level:'xiong', wuxing:'火', desc:'丁巳火。虚惊怪异之神。今日须防欺诈与意外惊吓。言语之间多留神，莫信空穴来风。' },
  { name:'朱雀', level:'zhong', wuxing:'火', desc:'丙午火。文书口舌之神。今日宜慎言慎行，文书合同多加审阅。然朱雀亦主文采，利于创作表达。' },
  { name:'六合', level:'ji', wuxing:'木', desc:'乙卯木。和合婚姻之神。今日利于合作、谈判、姻缘。万物以和为贵，和气自能生财。' },
  { name:'勾陈', level:'xiong', wuxing:'土', desc:'戊辰土。争斗田土之神。今日宜防纷争与不动产相关事宜。守拙藏锋，不与人争。' },
  { name:'青龙', level:'ji', wuxing:'木', desc:'甲寅木。财帛喜庆之神。大吉大利，今日财喜双全。所谋之事有贵人相助，顺风顺水。' },
  { name:'天空', level:'xiong', wuxing:'土', desc:'戊戌土。虚诈不实之神。今日宜防虚言假语、空欢喜。做事须落在实处，忌好高骛远。' },
  { name:'白虎', level:'xiong', wuxing:'金', desc:'庚申金。道路血光之神。今日出行多加小心，忌争强好胜动肝火。心平气和为上。' },
  { name:'太常', level:'ji', wuxing:'土', desc:'己未土。宴乐衣食之神。今日口福不浅，宜享美食酬劳自己。凡事以平常心处之。' },
  { name:'玄武', level:'xiong', wuxing:'水', desc:'癸亥水。盗贼阴私之神。今日谨防钱财丢失、隐私泄露。重要资料妥善保管。' },
  { name:'太阴', level:'ji', wuxing:'金', desc:'辛酉金。阴私暗昧之神。今日宜低调行事，暗中布局。事以密成，语以泄败。' },
  { name:'天后', level:'ji', wuxing:'水', desc:'壬子水。恩泽庇佑之神。今日得女性贵人相助。温润如水，以柔克刚。' },
];

/* ========== HELPERS ========== */
function hashCode(str){ let h=0; for(let i=0;i<str.length;i++){h=((h<<5)-h)+str.charCodeAt(i);h|=0;} return Math.abs(h); }

function getLineStr(val){
  return val===0?'— —':val===1?'———':val===2?'— — × → ———':val===3?'——— ○ → — —':'';
}

function triIdx(rem){
  const map=[1,0,7,2,4,6,3,5]; // idx rem 1乾(0) 2兑(7) 3离(2) 4震(4) 5巽(6) 6坎(3) 7艮(5) 8/0坤(1)
  return map[rem];
}

function meiHuaChange(n1,n2){
  const r1 = n1%8 || 8, r2 = n2%8 || 8;
  const upper = triIdx(r1), lower = triIdx(r2);
  const dongYao = ((n1+n2)%6);
  const dongYao1 = dongYao===0?6:dongYao;
  return {upper,lower,dongYao:dongYao1,dongIdx:dongYao1-1};
}

function xiaoLiuRenCalc(n1,n2){
  const p = ((n1-1)%6 + (n2-1)%6)%6;
  const shun = ((n1-1)%6)+1;
  const ni = 6-((n2-1)%6);
  const final = ((n1+n2-1)%6)%6;
  return xiaoLiuRen[final];
}

/* ========== MAIN ========== */
function doDivination(){
  const n1=parseInt(document.getElementById('num1').value,10);
  const n2=parseInt(document.getElementById('num2').value,10);
  if(isNaN(n1)||isNaN(n2)||n1<1||n2<1){
    if(isNaN(n1)||n1<1)document.getElementById('num1').focus();
    else document.getElementById('num2').focus();
    return;
  }

  const dateStr=`${new Date().getFullYear()}${new Date().getMonth()+1}${new Date().getDate()}`;
  const dateHash=hashCode(dateStr);
  const seed=Math.abs(n1*31+n2)^dateHash;

  /* --- 小六壬 --- */
  const xlr=xiaoLiuRenCalc(n1,n2);
  document.getElementById('cardXiaoLiuRen').innerHTML=`
    <div class="method-head">
      <div class="icon" style="background:#f3e0f0;">🔮</div>
      <h2>小六壬</h2>
      <span class="badge ${xlr.level==='ji'?'badge-ji':'badge-xiong'}">${xlr.level==='ji'?'吉':'凶'}</span>
    </div>
    <div class="method-body">
      <div class="gua-display">
        <div class="big-name">${xlr.name}</div>
        <div class="detail">五行属${xlr.wuxing}　·　方位${xlr.dir}</div>
      </div>
      <p>${xlr.desc}</p>
      <div class="xiaoliuren-grid">
        <div class="sl-item"><span class="sl-label">事业</span><br>${xlr.career}</div>
        <div class="sl-item"><span class="sl-label">财运</span><br>${xlr.wealth}</div>
        <div class="sl-item"><span class="sl-label">感情</span><br>${xlr.love}</div>
        <div class="sl-item"><span class="sl-label">健康</span><br>${xlr.health}</div>
      </div>
    </div>`;

  /* --- 梅花易数 --- */
  const mh=meiHuaChange(n1,n2);

  // generate 6 lines for 本卦 using seed
  const benLines=[];
  for(let i=0;i<6;i++) benLines.push(((seed>>(i*5))&0x1f)&1);

  // 互卦: lines 2,3,4 → lower trigram; lines 3,4,5 → upper trigram (1-indexed)
  const triValToIdx=[1,5,3,6,4,2,7,0]; // 3-bit value → baGua index (☷→坤1,☶→艮5,☵→坎3,☴→巽6,☳→震4,☲→离2,☱→兑7,☰→乾0)
  const interLoVal=(benLines[3]<<2)|(benLines[2]<<1)|benLines[1];
  const interUpVal=(benLines[4]<<2)|(benLines[3]<<1)|benLines[2];
  const interG=findHex(triValToIdx[interUpVal],triValToIdx[interLoVal]);

  // 变卦: flip the changing line
  const bianLines=[...benLines];
  bianLines[mh.dongIdx]=bianLines[mh.dongIdx]?0:1;
  const bianLoTri=(bianLines[2]<<2)|(bianLines[1]<<1)|bianLines[0];
  const bianUpTri=(bianLines[5]<<2)|(bianLines[4]<<1)|bianLines[3];
  const bianG=findHex(triValToIdx[bianUpTri],triValToIdx[bianLoTri]);

  const benG=findHex(mh.upper,mh.lower);

  const tiGua=mh.dongIdx<3?baGua[mh.upper]:baGua[mh.lower];
  const yongGua=mh.dongIdx<3?baGua[mh.lower]:baGua[mh.upper];
  const wuxingRel={
    '金':{生:'水',克:'木'},
    '水':{生:'木',克:'火'},
    '木':{生:'火',克:'土'},
    '火':{生:'土',克:'金'},
    '土':{生:'金',克:'水'},
  };
  let tiYongTxt='';
  if(tiGua.element===yongGua.element) tiYongTxt='体用比和，主客相得，万事顺遂。';
  else if(wuxingRel[tiGua.element]&&wuxingRel[tiGua.element].克===yongGua.element) tiYongTxt='体克用，事虽可成，然费力劳神，宜缓不宜急。';
  else if(wuxingRel[yongGua.element]&&wuxingRel[yongGua.element].克===tiGua.element) tiYongTxt='用克体，外势压主，今日宜守不宜攻，静待时机。';
  else if(wuxingRel[tiGua.element]&&wuxingRel[tiGua.element].生===yongGua.element) tiYongTxt='体生用，有耗损之象。付出多而回报少，宜量力而行。';
  else if(wuxingRel[yongGua.element]&&wuxingRel[yongGua.element].生===tiGua.element) tiYongTxt='用生体，外来生助之象。今日贵人相助，所谋之事易成，大吉。';

  document.getElementById('cardMeiHua').innerHTML=`
    <div class="method-head">
      <div class="icon" style="background:#f0e0f0;">🌸</div>
      <h2>梅花易数</h2>
      <span class="badge badge-ji">${tiYongTxt.includes('大吉')||tiYongTxt.includes('万事顺遂')?'吉':tiYongTxt.includes('用克体')||tiYongTxt.includes('体生用')?'凶':'中'}</span>
    </div>
    <div class="method-body">
      <div class="gua-display">
        <div class="big-name">${benG[2]}</div>
        <div class="detail">${baGua[mh.upper].symbol}${baGua[mh.upper].name}上 · ${baGua[mh.lower].symbol}${baGua[mh.lower].name}下　|　动第${mh.dongYao}爻</div>
      </div>
      <p>${benG[3]}</p>
      <div class="arrow-row">⬇ 互卦</div>
      <div class="gua-display">
        <div class="big-name" style="font-size:24px;">${interG[2]}</div>
        <div class="detail">互卦（过程之象）</div>
      </div>
      <p>${interG[3]}</p>
      <div class="arrow-row">⬇ 变卦</div>
      <div class="gua-display">
        <div class="big-name" style="font-size:26px; color:#d63384;">${bianG[2]}</div>
        <div class="detail">变卦（结果之象）</div>
      </div>
      <p>${bianG[3]}</p>
      <div class="sub-label">体用生克</div>
      <p><strong>体卦</strong>（${tiGua.symbol}${tiGua.name}·${tiGua.element}）← <strong>用卦</strong>（${yongGua.symbol}${yongGua.name}·${yongGua.element}）<br>${tiYongTxt}</p>
    </div>`;

  /* --- 六爻 --- */
  const yaoLines=[];
  for(let i=0;i<6;i++){
    const v=((seed>>(i*5+2))&0xff)%4;
    yaoLines.push({val:v,idx:i});
  }
  const triValToIdx2=[1,5,3,6,4,2,7,0];
  const yaoUpTri=((yaoLines[3].val&2?1:0)<<2)|((yaoLines[4].val&2?1:0)<<1)|(yaoLines[5].val&2?1:0);
  const yaoLoTri=((yaoLines[0].val&2?1:0)<<2)|((yaoLines[1].val&2?1:0)<<1)|(yaoLines[2].val&2?1:0);
  const yaoBenG=findHex(triValToIdx2[yaoUpTri]||0,triValToIdx2[yaoLoTri]||0);
  const changingLines=yaoLines.filter(l=>l.val===2||l.val===3);
  let liuYaoInterpret='';
  if(changingLines.length===0) liuYaoInterpret='六爻安静，无动爻。今日诸事以守为进，静观其变。';
  else if(changingLines.length===1) liuYaoInterpret=`仅一爻动，事机单纯明确。动爻在${['初','二','三','四','五','上'][changingLines[0].idx]}爻，此为事变之关键所在。`;
  else if(changingLines.length===2) liuYaoInterpret='两爻齐动，内外皆有变化。宜观上下两爻之势，取其中道而行。';
  else liuYaoInterpret=`${changingLines.length}爻齐动，变动过大。今日宜静不宜动，待尘埃落定再作决断。`;

  document.getElementById('cardLiuYao').innerHTML=`
    <div class="method-head">
      <div class="icon" style="background:#f0e0e8;">☯</div>
      <h2>六爻占卜</h2>
      <span class="badge ${changingLines.length===0?'badge-ji':changingLines.length<=2?'badge-zhong':'badge-xiong'}">${changingLines.length===0?'吉':changingLines.length<=2?'中':'凶'}</span>
    </div>
    <div class="method-body">
      <div class="gua-display">
        <div class="big-name">${yaoBenG[2]}</div>
        <div class="detail">本卦</div>
      </div>
      ${yaoLines.map(l=>`
        <div class="line-row">
          <span class="yao ${l.val===2||l.val===3?'yao-change':'yao-stable'}">${getLineStr(l.val)}</span>
          <span style="font-size:11px;color:#b088b8;">${['初','二','三','四','五','上'][l.idx]}爻${l.val===0?' · 少阴':l.val===1?' · 少阳':l.val===2?' · 老阴 → 少阳':l.val===3?' · 老阳 → 少阴':''}</span>
        </div>
      `).join('')}
      <p>${liuYaoInterpret}</p>
      <div class="sub-label">卦辞</div>
      <p>${yaoBenG[3]}</p>
    </div>`;

  /* --- 大六壬 --- */
  const dlrIdx=(n1+n2)%12;
  const dlr=tianJiang[dlrIdx];
  document.getElementById('cardDaLiuRen').innerHTML=`
    <div class="method-head">
      <div class="icon" style="background:#eee0f0;">🐉</div>
      <h2>大六壬</h2>
      <span class="badge ${dlr.level==='ji'?'badge-ji':dlr.level==='xiong'?'badge-xiong':'badge-zhong'}">${dlr.level==='ji'?'吉':dlr.level==='xiong'?'凶':'中'}</span>
    </div>
    <div class="method-body">
      <div class="gua-display">
        <div class="big-name">${dlr.name}</div>
        <div class="detail">天将 · ${dlr.wuxing}神</div>
      </div>
      <p>${dlr.desc}</p>
    </div>`;

  document.getElementById('resultArea').classList.add('show');
  setTimeout(()=>{
    document.getElementById('resultArea').scrollIntoView({behavior:'smooth',block:'start'});
  },100);
}

function resetAll(){
  document.getElementById('resultArea').classList.remove('show');
  document.getElementById('num1').value='';
  document.getElementById('num2').value='';
  document.getElementById('num1').focus();
  window.scrollTo({top:0,behavior:'smooth'});
}

document.getElementById('num2').addEventListener('keydown',function(e){
  if(e.key==='Enter')doDivination();
});
</script>

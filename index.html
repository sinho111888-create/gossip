body {

.header {

  margin-bottom:32px;
}

.header h1 {

}

.input-card label {

  color:#9b7aaa;

.num-row {

.num-row input {

.num-row .sep {

  letter-spacing:4px;
  cursor:pointer;
  transition:all .25s;
  box-shadow:0 2px 12px rgba(140,60,160,0.2);
}

.num-row button:hover {
  transform:translateY(-1px);
  box-shadow:0 4px 18px rgba(140,60,160,0.3);
}

.num-row button:active {
  transform:scale(0.97);
}

.result-area {
  display:none;
  width:100%;
  max-width:600px;
}

.result-area.show { display:block; }

.result-card {
  background:#fff;
  border-radius:14px;
  padding:28px 32px;
  margin-bottom:16px;
  box-shadow:0 1px 12px rgba(130,60,160,0.05);
  border:1px solid #ecd8f0;

.result-card h2 {
  font-family:'Ma Shan Zheng', cursive;

  color:#8b3a9e;
  letter-spacing:3px;
  margin-bottom:18px;
  text-align:center;

.gua-display {

  margin:8px 0;

  border-radius:10px;

.gua-display .big-name {

  color:#8b3a9e;
  letter-spacing:4px;
}

.gua-display .detail {

  margin-top:2px;
  letter-spacing:1px;
}

.desc-text {

.section-label {

}

.section-text {
  font-size:14px;
  color:#5e4270;
  line-height:1.8;
}

.fortune-grid {

  margin-top:10px;
}

.fortune-card {
  background:#fdf8fe;
  border-radius:8px;
  padding:12px 14px;
}

.fortune-card .card-label {
  font-size:11px;
  color:#a880b8;
  letter-spacing:1px;
  margin-bottom:4px;
}

.fortune-card .card-val {
  font-size:13px;
  color:#5e4270;
  line-height:1.6;
}

}

.music-card .music-icon {
  font-size:36px;
  margin-bottom:8px;
}

.music-card .song-title {

  font-size:22px;
  color:#a040c0;
  letter-spacing:2px;
}

.music-card .song-artist {
  font-size:13px;
  color:#a878b8;
  margin:4px 0 8px;

.music-card .song-vibe {

  border-radius:12px;

}

.music-card .song-reason {

  color:#9b7aaa;
  margin-top:10px;

}

.fun-fact-card {

  padding:14px 18px;
  margin-top:16px;
  border:1px solid #f0d8f0;

  color:#b088b8;
  letter-spacing:2px;

.fun-fact-text {
  font-size:13px;
  color:#5e4270;
  line-height:1.7;
}

.social-section {

}

.like-bar {

  justify-content:center;
  gap:8px;
  padding:14px 0;

.like-btn {

  cursor:pointer;

  color:#b870d0;
  letter-spacing:2px;
}

.like-btn:hover { border-color:#d080e0; background:#fdf8fe; }

  color:#b088b8;
  letter-spacing:1px;

  50% { transform:scale(1.4); opacity:1; }
  100% { transform:scale(1); opacity:1; }
}

.heart-float {
  position:fixed;

  font-size:24px;

.tip-qr.show { display:block; }

.tip-qr .qr-placeholder {

  width:140px; height:140px;

  align-items:center;
  justify-content:center;

.footer-action {

  margin-top:24px;

  border:1.5px solid #d8b8e0;
  border-radius:20px;
  padding:8px 28px;
  font-size:13px;
  color:#8b5098;

  transition:all .25s;

  color:#6b3080;
  background:#fdf8fe;

  from { opacity:0; transform:translateY(16px); }
  to { opacity:1; transform:translateY(0); }

.result-area.show .result-card {
  animation:fadeUp .5s ease both;
}

@media (max-width:480px) {
  body { padding:24px 12px 40px; }
  .num-row input { width:72px; font-size:18px; padding:10px 0; }
  .num-row button { padding:10px 20px; font-size:15px; }
  .result-card { padding:20px 18px; }
  .fortune-grid { grid-template-columns:1fr; }
  .header h1 { font-size:38px; }
}
</style>
</head>

function hashCode(str){ let h=0; for(let i=0;i<str.length;i++){h=((h<<5)-h)+str.charCodeAt(i);h|=0;} return Math.abs(h); }

const triMap=[1,0,7,2,4,6,3,5];
function triIdx(rem){ return triMap[rem]; }

function meiHuaChange(n1,n2){
  const r1=n1%8, r2=n2%8;
  const upper=triIdx(r1), lower=triIdx(r2);
  const dongYao=(n1+n2)%6;
  const dongYao1=dongYao===0?6:dongYao;
  return {upper,lower,dongYao:dongYao1,dongIdx:dongYao1-1};
}

function findHex(upper,lower){
  for(let h of hex64) if(h[0]===upper&&h[1]===lower) return h;

  return [upper,lower, l.name+u.name, `${l.desc}同时${u.desc}。上卦为${u.nature}、下卦为${l.nature}，合而观之。`];
}

  return '感情平稳，不急不躁。今天适合顺其自然，别强求。';
}

/* ========== 音乐推荐 ========== */
function getSong(hex, seed){
  const upGua = baGua[hex[0]], loGua = baGua[hex[1]];
  // 以用卦（有动爻的那一卦）为主选歌，用卦代表外界/变化
  const primary = upGua.name; // 上卦主外
  const pool = songDB[primary] || songDB['乾'];
  const idx = ((hex[0]*31 + hex[1]*7 + seed) % pool.length + pool.length) % pool.length;
  return pool[idx];
}

/* ========== MAIN ========== */
function doDivination(){
  const n1=parseInt(document.getElementById('num1').value,10);
  const n2=parseInt(document.getElementById('num2').value,10);
  if(isNaN(n1)||isNaN(n2)||n1<1||n2<1){
    if(isNaN(n1)||n1<1)document.getElementById('num1').focus();
    else document.getElementById('num2').focus();
    return;
  }

  const dateStr=`${new Date().getFullYear()}${new Date().getMonth()+1}${new Date().getDate()}`;
  const dateHash=hashCode(dateStr);
  const seed=Math.abs(n1*31+n2)^dateHash;

  const mh=meiHuaChange(n1,n2);

  // 六爻
  const benLines=[];
  for(let i=0;i<6;i++) benLines.push(((seed>>(i*5))&0x1f)&1);

  // 互卦
  const triValToIdx=[1,5,3,6,4,2,7,0];
  const interLoVal=(benLines[3]<<2)|(benLines[2]<<1)|benLines[1];
  const interUpVal=(benLines[4]<<2)|(benLines[3]<<1)|benLines[2];
  const interG=findHex(triValToIdx[interUpVal],triValToIdx[interLoVal]);

  // 变卦
  const bianLines=[...benLines];
  bianLines[mh.dongIdx]=bianLines[mh.dongIdx]?0:1;
  const bianLoTri=(bianLines[2]<<2)|(bianLines[1]<<1)|bianLines[0];
  const bianUpTri=(bianLines[5]<<2)|(bianLines[4]<<1)|bianLines[3];
  const bianG=findHex(triValToIdx[bianUpTri],triValToIdx[bianLoTri]);

  const benG=findHex(mh.upper,mh.lower);

  // 体用生克
  const tiGua=mh.dongIdx<3?baGua[mh.upper]:baGua[mh.lower];
  const yongGua=mh.dongIdx<3?baGua[mh.lower]:baGua[mh.upper];
  const wuxingRel={
    '金':{生:'水',克:'木'},'水':{生:'木',克:'火'},'木':{生:'火',克:'土'},
    '火':{生:'土',克:'金'},'土':{生:'金',克:'水'},
  };
  let tiYongTxt='';
  if(tiGua.element===yongGua.element) tiYongTxt='体用比和，主客相得，万事顺遂。';
  else if(wuxingRel[tiGua.element]&&wuxingRel[tiGua.element].克===yongGua.element) tiYongTxt='体克用，事虽可成，然费力劳神，宜缓不宜急。';
  else if(wuxingRel[yongGua.element]&&wuxingRel[yongGua.element].克===tiGua.element) tiYongTxt='用克体，外势压主，今日宜守不宜攻，静待时机。';
  else if(wuxingRel[tiGua.element]&&wuxingRel[tiGua.element].生===yongGua.element) tiYongTxt='体生用，有耗损之象。付出多而回报少，宜量力而行。';
  else if(wuxingRel[yongGua.element]&&wuxingRel[yongGua.element].生===tiGua.element) tiYongTxt='用生体，外来生助之象。今日贵人相助，所谋之事易成，大吉。';

  // 音乐推荐
  const song=getSong(benG, seed);
  const enName = getEnName(mh.upper, mh.lower);
  const funFact = getFunFact(mh.upper, mh.lower, seed);

  document.getElementById('resultCard').innerHTML=`
    <h2>${benG[2]}</h2>
    <div style="text-align:center;font-size:12px;color:#b088b8;letter-spacing:1px;margin-bottom:10px;">${enName}</div>
    <div class="gua-display">
      <div class="detail">${baGua[mh.upper].symbol}${baGua[mh.upper].name}上 · ${baGua[mh.lower].symbol}${baGua[mh.lower].name}下　|　动第${mh.dongYao}爻</div>
    </div>
    <p class="desc-text">${benG[3]}</p>

    <div class="arrow-row">⬇ 互卦（过程之象）</div>
    <div class="gua-display">
      <div class="big-name" style="font-size:24px;">${interG[2]}</div>
    </div>
    <p class="desc-text">${interG[3]}</p>

    <div class="arrow-row">⬇ 变卦（结果之象）</div>
    <div class="gua-display">
      <div class="big-name" style="font-size:28px; color:#d63384;">${bianG[2]}</div>
    </div>
    <p class="desc-text">${bianG[3]}</p>

    <div class="section-label">体用生克</div>
    <p class="section-text"><strong>体卦</strong>（${tiGua.symbol}${tiGua.name}·${tiGua.element}）→ <strong>用卦</strong>（${yongGua.symbol}${yongGua.name}·${yongGua.element}）<br>${tiYongTxt}</p>

    <div class="fortune-grid">
      <div class="fortune-card">
        <div class="card-label">💰 正财</div>
        <div class="card-val">${getFortuneZhengCai(tiYongTxt)}</div>
      </div>
      <div class="fortune-card">
        <div class="card-label">🎲 偏财</div>
        <div class="card-val">${getFortunePianCai(tiYongTxt)}</div>
      </div>
      <div class="fortune-card">
        <div class="card-label">💪 健康</div>
        <div class="card-val">${getFortuneHealth(tiYongTxt, tiGua)}</div>
      </div>
      <div class="fortune-card">
        <div class="card-label">💕 感情</div>
        <div class="card-val">${getFortuneLove(tiYongTxt)}</div>
      </div>
    </div>

    <div class="fun-fact-card">
      <div class="fun-fact-label">📚 国学冷知识</div>
      <div class="fun-fact-text">${funFact}</div>
    </div>

    <div class="music-card">
      <div class="music-icon">🎵 今日卦曲</div>
      <div class="song-title">${song.title}</div>
      <div class="song-artist">${song.artist}</div>
      <div class="song-vibe">${song.vibe}</div>
      <div class="song-reason">${song.reason}</div>
    </div>

    <div class="social-section">
      <div class="like-bar">
        <button class="like-btn" id="likeBtn" onclick="toggleLike(${seed})">❤️ 赞一下</button>
        <span class="like-count" id="likeCount">${getLikeCount(seed)} 人觉得很赞</span>
      </div>

      <div class="comment-box">
        <div class="cmt-label">💬 留下你的卦后感</div>
        <input type="text" id="cmtName" placeholder="你的名字（选填）" maxlength="20">
        <textarea id="cmtMsg" placeholder="写点什么..." maxlength="200"></textarea>
        <button class="cmt-submit" onclick="addComment(${seed})">发 送</button>
        <div class="cmt-list" id="cmtList">${renderComments(seed)}</div>
      </div>

      <div class="tip-toggle">
        <button onclick="toggleTip()">☕ 请作者喝杯咖啡</button>
        <div class="tip-qr" id="tipQr">
          <img src="qrcode.png" alt="赞赏码" style="width:180px;height:180px;border-radius:10px;display:block;margin:0 auto;">
          <div style="font-size:11px;color:#b088b8;margin-top:6px;">感谢你的咖啡 ☕</div>
        </div>
      </div>
    </div>
  `;

  document.getElementById('resultArea').classList.add('show');
  setTimeout(()=>{
    document.getElementById('resultArea').scrollIntoView({behavior:'smooth',block:'start'});
    // restore like state
    const liked = localStorage.getItem('gossip_liked_'+seed);
    const btn = document.getElementById('likeBtn');
    if(liked){ btn.classList.add('liked'); btn.innerHTML = '❤️ 已赞'; }
  },100);
}

/* ========== 互动功能 ========== */
function getLikeCount(seed){
  const base = (seed % 37) + 8;
  const liked = localStorage.getItem('gossip_liked_'+seed);
  return base + (liked ? 1 : 0);
}

function toggleLike(seed){
  const key = 'gossip_liked_'+seed;
  const liked = localStorage.getItem(key);
  const btn = document.getElementById('likeBtn');
  const countEl = document.getElementById('likeCount');
  const base = (seed % 37) + 8;

  if(liked){
    localStorage.removeItem(key);
    btn.classList.remove('liked');
    btn.innerHTML = '❤️ 赞一下';
    countEl.textContent = base + ' 人觉得很赞';
  } else {
    localStorage.setItem(key, '1');
    btn.classList.add('liked');
    btn.innerHTML = '❤️ 已赞';
    countEl.textContent = (base + 1) + ' 人觉得很赞';
    // Heart float animation
    const heart = document.createElement('span');
    heart.className = 'heart-float';
    heart.textContent = '❤️';
    heart.style.left = (btn.getBoundingClientRect().left + btn.offsetWidth/2 - 12) + 'px';
    heart.style.top = (btn.getBoundingClientRect().top - 20) + 'px';
    document.body.appendChild(heart);
    setTimeout(() => heart.remove(), 600);
  }
}

function getComments(seed){
  try { return JSON.parse(localStorage.getItem('gossip_cmts_'+seed) || '[]'); }
  catch(e) { return []; }
}

function addComment(seed){
  const name = document.getElementById('cmtName').value.trim() || '匿名';
  const msg = document.getElementById('cmtMsg').value.trim();
  if(!msg) return;
  const cmts = getComments(seed);
  cmts.push({ name, msg, time: new Date().toLocaleString('zh-CN',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'}) });
  if(cmts.length > 20) cmts.shift();
  localStorage.setItem('gossip_cmts_'+seed, JSON.stringify(cmts));
  document.getElementById('cmtName').value = '';
  document.getElementById('cmtMsg').value = '';
  document.getElementById('cmtList').innerHTML = renderComments(seed);
}

function renderComments(seed){
  const cmts = getComments(seed);
  if(!cmts.length) return '<div style="font-size:11px;color:#b088b8;padding:6px 0;">还没有评论，来说两句吧～</div>';
  return cmts.map(c => `<div class="cmt-item"><span class="cmt-name">${escHtml(c.name)}</span><span class="cmt-msg">${escHtml(c.msg)}</span><span class="cmt-time">${c.time}</span></div>`).join('');
}

function escHtml(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function toggleTip(){
  const qr = document.getElementById('tipQr');
  qr.classList.toggle('show');
}

function resetAll(){
  document.getElementById('resultArea').classList.remove('show');
  document.getElementById('num1').value='';
  document.getElementById('num2').value='';
  document.getElementById('num1').focus();
  window.scrollTo({top:0,behavior:'smooth'});
}

document.getElementById('num2').addEventListener('keydown',function(e){
  if(e.key==='Enter')doDivination();
});
</script>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>每日一占</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@300;400;600;700&display=swap');

* { margin:0; padding:0; box-sizing:border-box; }

body {
  min-height:100vh;
  background: linear-gradient(160deg, #faf5fc 0%, #f3e8f8 30%, #fce8f0 100%);
  font-family: 'Noto Serif SC', serif;
  color: #3d2648;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:40px 20px 60px;
}

.header {
  text-align:center;
  margin-bottom:32px;
}

.header h1 {
  font-family:'Ma Shan Zheng', cursive;
  font-size:44px;
  color:#8b3a9e;
  letter-spacing:6px;
  margin-bottom:6px;
}

.header .sub {
  font-size:13px;
  color:#b088b8;
  letter-spacing:4px;
}

.input-card {
  background:#fff;
  border-radius:16px;
  padding:28px 32px;
  width:100%;
  max-width:460px;
  box-shadow: 0 2px 20px rgba(130,60,160,0.08), 0 1px 4px rgba(130,60,160,0.04);
  margin-bottom:28px;
  border:1px solid #ecd8f0;
}

.input-card label {
  display:block;
  text-align:center;
  font-size:14px;
  color:#9b7aaa;
  letter-spacing:3px;
  margin-bottom:14px;
}

.num-row {
  display:flex;
  gap:12px;
  align-items:center;
  justify-content:center;
}

.num-row input {
  width:100px;
  padding:12px 0;
  text-align:center;
  font-size:22px;
  font-family:'Noto Serif SC', serif;
  border:1.5px solid #e4c8e8;
  border-radius:10px;
  color:#5b2870;
  background:#fdf8fe;
  outline:none;
  transition:all .25s;
  -moz-appearance:textfield;
}
.num-row input::-webkit-inner-spin-button { display:none; }

.num-row input:focus {
  border-color:#b870d0;
  box-shadow:0 0 0 3px rgba(180,100,200,0.1);
  background:#fff;
}

.num-row .sep {
  font-size:20px;
  color:#c8a0d0;
  font-family:'Ma Shan Zheng', cursive;
}

.num-row button {
  padding:12px 32px;
  background:linear-gradient(135deg, #a855c8, #8b3a9e);
  border:none;
  border-radius:10px;
  color:#fff;
  font-size:17px;
  font-family:'Ma Shan Zheng', cursive;
  letter-spacing:4px;
  cursor:pointer;
  transition:all .25s;
  box-shadow:0 2px 12px rgba(140,60,160,0.2);
}

.num-row button:hover {
  transform:translateY(-1px);
  box-shadow:0 4px 18px rgba(140,60,160,0.3);
}

.num-row button:active {
  transform:scale(0.97);
}

.result-area {
  display:none;
  width:100%;
  max-width:680px;
}

.result-area.show { display:block; }

.method-card {
  background:#fff;
  border-radius:14px;
  padding:24px 28px;
  margin-bottom:16px;
  box-shadow:0 1px 12px rgba(130,60,160,0.05);
  border:1px solid #ecd8f0;
  transition:all .3s;
}

.method-card:hover {
  box-shadow:0 4px 24px rgba(130,60,160,0.1);
}

.method-head {
  display:flex;
  align-items:center;
  gap:10px;
  margin-bottom:14px;
  padding-bottom:10px;
  border-bottom:1px solid #f4e4f8;
}

.method-head .icon {
  width:32px; height:32px;
  border-radius:8px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:16px;
}

.method-head h2 {
  font-size:17px;
  font-weight:600;
  color:#5b2870;
  letter-spacing:2px;
}

.method-head .badge {
  font-size:10px;
  padding:2px 8px;
  border-radius:20px;
  letter-spacing:1px;
  font-weight:600;
}

.badge-ji { background:#e8f5e0; color:#5b9a3a; }
.badge-xiong { background:#fde8e8; color:#c84848; }
.badge-zhong { background:#fef3e0; color:#b87828; }

.method-body {
  font-size:14px;
  line-height:1.8;
  color:#5e4270;
}

.method-body .line-row {
  display:flex;
  align-items:center;
  gap:8px;
  padding:4px 0;
  font-size:15px;
}

.method-body .line-row .yao {
  font-size:20px;
  min-width:80px;
  letter-spacing:2px;
}

.yao-change { color:#d63384; font-weight:700; }
.yao-stable { color:#6b4d78; }

.gua-display {
  text-align:center;
  padding:12px 0;
  margin:8px 0;
  background:#fdf8fe;
  border-radius:10px;
}

.gua-display .big-name {
  font-family:'Ma Shan Zheng', cursive;
  font-size:32px;
  color:#8b3a9e;
  letter-spacing:4px;
}

.gua-display .detail {
  font-size:12px;
  color:#b088b8;
  margin-top:2px;
  letter-spacing:1px;
}

.method-body .sub-label {
  font-size:12px;
  color:#b088b8;
  letter-spacing:2px;
  margin-top:10px;
  margin-bottom:4px;
}

.fortune-grid {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
  margin-top:10px;
}

.fortune-card {
  background:#fdf8fe;
  border-radius:8px;
  padding:10px 12px;
}

.fortune-card .card-label {
  font-size:11px;
  color:#a880b8;
  letter-spacing:1px;
  margin-bottom:4px;
}

.fortune-card .card-val {
  font-size:13px;
  color:#5e4270;
  line-height:1.6;
}

.arrow-row {
  display:flex;
  align-items:center;
  justify-content:center;
  gap:12px;
  margin:8px 0;
  font-size:14px;
  color:#a878b8;
}

.xiaoliuren-grid {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
  margin-top:8px;
}

.xiaoliuren-grid .sl-item {
  font-size:13px;
  padding:6px 10px;
  background:#fdf8fe;
  border-radius:8px;
}

.sl-item .sl-label {
  font-size:11px;
  color:#a880b8;
  letter-spacing:1px;
}

.method-body p {
  margin:4px 0;
}

.footer-action {
  text-align:center;
  margin-top:24px;
}

.footer-action button {
  background:none;
  border:1.5px solid #d8b8e0;
  border-radius:20px;
  padding:8px 28px;
  font-size:13px;
  color:#8b5098;
  letter-spacing:3px;
  cursor:pointer;
  font-family:'Noto Serif SC', serif;
  transition:all .25s;
}

.footer-action button:hover {
  border-color:#b870d0;
  color:#6b3080;
  background:#fdf8fe;
}

@keyframes fadeUp {
  from { opacity:0; transform:translateY(16px); }
  to { opacity:1; transform:translateY(0); }
}

.result-area.show .method-card {
  animation:fadeUp .5s ease both;
}
.result-area.show .method-card:nth-child(1) { animation-delay:0s; }
.result-area.show .method-card:nth-child(2) { animation-delay:.08s; }
.result-area.show .method-card:nth-child(3) { animation-delay:.16s; }
.result-area.show .method-card:nth-child(4) { animation-delay:.24s; }

@media (max-width:480px) {
  body { padding:24px 12px 40px; }
  .num-row input { width:72px; font-size:18px; padding:10px 0; }
  .num-row button { padding:10px 20px; font-size:15px; }
  .method-card { padding:16px 18px; }
  .xiaoliuren-grid { grid-template-columns:1fr; }
}
</style>
</head>
<body>

<div class="header">
  <h1>每日一占</h1>
  <div class="sub">— 小六壬 · 梅花易数 · 六爻 · 大六壬 —</div>
</div>

<div class="input-card">
  <label>心中默想两个数字</label>
  <div class="num-row">

  for (let h of hex64) {

  return [upper,lower, l.name+u.name, `${l.desc}同时${u.desc}。上卦为${u.nature}、下卦为${l.nature}，合而观之。`];

/* ========== HELPERS ========== */
function hashCode(str){ let h=0; for(let i=0;i<str.length;i++){h=((h<<5)-h)+str.charCodeAt(i);h|=0;} return Math.abs(h); }

function getLineStr(val){
  return val===0?'— —':val===1?'———':val===2?'— — × → ———':val===3?'——— ○ → — —':'';
}

function triIdx(rem){
  const map=[1,0,7,2,4,6,3,5]; // idx rem 1乾(0) 2兑(7) 3离(2) 4震(4) 5巽(6) 6坎(3) 7艮(5) 8/0坤(1)
  return map[rem];
}

function meiHuaChange(n1,n2){
  const r1 = n1%8 || 8, r2 = n2%8 || 8;
  const upper = triIdx(r1), lower = triIdx(r2);
  const dongYao = ((n1+n2)%6);
  const dongYao1 = dongYao===0?6:dongYao;
  return {upper,lower,dongYao:dongYao1,dongIdx:dongYao1-1};
}

function xiaoLiuRenCalc(n1,n2){
  const p = ((n1-1)%6 + (n2-1)%6)%6;
  const shun = ((n1-1)%6)+1;
  const ni = 6-((n2-1)%6);
  const final = ((n1+n2-1)%6)%6;
  return xiaoLiuRen[final];
}

      <div class="fortune-grid">
        <div class="fortune-card">
          <div class="card-label">💰 财运</div>
          <div class="card-val card-wealth">${getLiuYaoWealth(changingLines.length)}</div>
        </div>
        <div class="fortune-card">
          <div class="card-label">❤️ 感情</div>
          <div class="card-val card-love">${getLiuYaoLove(changingLines.length)}</div>
        </div>
      </div>
    </div>`;

  /* --- 大六壬 --- */
  const dlrIdx=(n1+n2)%12;
  const dlr=tianJiang[dlrIdx];
  document.getElementById('cardDaLiuRen').innerHTML=`
    <div class="method-head">
      <div class="icon" style="background:#eee0f0;">🐉</div>
      <h2>大六壬</h2>
      <span class="badge ${dlr.level==='ji'?'badge-ji':dlr.level==='xiong'?'badge-xiong':'badge-zhong'}">${dlr.level==='ji'?'吉':dlr.level==='xiong'?'凶':'中'}</span>
    </div>
    <div class="method-body">
      <div class="gua-display">
        <div class="big-name">${dlr.name}</div>
        <div class="detail">天将 · ${dlr.wuxing}神</div>
      </div>
      <p>${dlr.desc}</p>
      <div class="fortune-grid">
        <div class="fortune-card">
          <div class="card-label">💰 财运</div>
          <div class="card-val card-wealth">${dlr.wealth}</div>
        </div>
        <div class="fortune-card">
          <div class="card-label">❤️ 感情</div>
          <div class="card-val card-love">${dlr.love}</div>
        </div>
      </div>
    </div>`;

  document.getElementById('resultArea').classList.add('show');
  setTimeout(()=>{
    document.getElementById('resultArea').scrollIntoView({behavior:'smooth',block:'start'});
  },100);
}

function resetAll(){
  document.getElementById('resultArea').classList.remove('show');
  document.getElementById('num1').value='';
  document.getElementById('num2').value='';
  document.getElementById('num1').focus();
  window.scrollTo({top:0,behavior:'smooth'});
}

document.getElementById('num2').addEventListener('keydown',function(e){
  if(e.key==='Enter')doDivination();
});
</script>
</body>
</html>
